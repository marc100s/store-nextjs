trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  NODE_VERSION: '20.x'
  PNPM_VERSION: '7.5.1'
  PNPM_STORE_PATH: '$(Pipeline.Workspace)/.pnpm-store'

steps:
  - checkout: self
    clean: 'true'

  - task: NodeTool@0
    displayName: Use Node.js $(NODE_VERSION)
    inputs:
      versionSpec: '$(NODE_VERSION)'

  - script: |
      corepack enable
      corepack prepare pnpm@$(PNPM_VERSION) --activate
      pnpm --version
    displayName: Setup pnpm

  - task: Cache@2
    displayName: Cache pnpm store
    inputs:
      key: 'pnpm | "$(Agent.OS)" | pnpm-lock.yaml'
      restoreKeys: |
        pnpm | "$(Agent.OS)"
      path: '$(PNPM_STORE_PATH)'

  - script: pnpm config set store-dir $(PNPM_STORE_PATH)
    displayName: Configure pnpm store path

  - script: pnpm install --frozen-lockfile
    displayName: Install dependencies

  - script: pnpm lint
    displayName: Lint

  - script: pnpm test -- --ci
    displayName: Test

  - script: |
      export DATABASE_URL="${DATABASE_URL:-postgresql://postgres:postgres@localhost:5432/postgres?schema=public}"
      export NEXTAUTH_SECRET="${NEXTAUTH_SECRET:-ci-local-secret}"
      pnpm build
    displayName: Build

  - task: CopyFiles@2
    displayName: Stage build artifacts
    inputs:
      SourceFolder: '$(Build.SourcesDirectory)'
      Contents: |
        .next/**
        public/**
        prisma/**
        package.json
        pnpm-lock.yaml
        next.config.ts
      TargetFolder: '$(Build.ArtifactStagingDirectory)/app'

  - publish: '$(Build.ArtifactStagingDirectory)/app'
    displayName: Publish artifact
    artifact: drop
